# Triggers a Cursor Cloud Agent to investigate bugs and open a draft PR.
#
# Requires repository secret: CURSOR_API_KEY
# Setup guide: docs/BUG_AGENT_AUTOMATION.md
#
# Triggers:
#   - CI failure on main (workflow_run)
#   - Weekly scheduled scan
#   - Manual workflow_dispatch

name: Cursor Bug Agent

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why this run was triggered
        required: false
        default: manual bug scan
      base_ref:
        description: Branch to fix from
        required: false
        default: main

  schedule:
    # Mondays 06:00 UTC — proactive bug scan
    - cron: "0 6 * * 1"

  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  actions: read

concurrency:
  group: cursor-bug-agent-${{ github.repository }}
  cancel-in-progress: false

jobs:
  trigger:
    name: Start Cursor bug-fix agent
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Skip agent PR loops and only auto-fix main-branch CI failures
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.event == 'push' &&
        !startsWith(github.event.workflow_run.head_branch, 'cursor/')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build trigger context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          REASON: ${{ github.event.inputs.reason || '' }}
          BASE_REF: ${{ github.event.inputs.base_ref || 'main' }}
          WORKFLOW_RUN_URL: ${{ github.event.workflow_run.html_url || '' }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch || '' }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha || '' }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event || '' }}
        run: |
          CONTEXT=""
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            CONTEXT="Manual trigger: ${REASON:-manual bug scan}"
          elif [[ "$EVENT_NAME" == "schedule" ]]; then
            CONTEXT="Scheduled weekly proactive bug scan on branch: main"
          elif [[ "$EVENT_NAME" == "workflow_run" ]]; then
            CONTEXT="CI failed on main.
          Workflow: ${WORKFLOW_RUN_URL}
          Branch: ${WORKFLOW_RUN_BRANCH}
          SHA: ${WORKFLOW_RUN_SHA}
          Event: ${WORKFLOW_RUN_EVENT}

          Investigate the CI failure logs, fix the root cause, and verify with npm run check."
          fi
          {
            echo "extra_context<<EOF"
            echo "$CONTEXT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "base_ref=${BASE_REF}" >> "$GITHUB_OUTPUT"

      - name: Trigger Cursor Cloud Agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          REPO_URL: https://github.com/${{ github.repository }}
          BASE_REF: ${{ steps.context.outputs.base_ref }}
          EXTRA_CONTEXT: ${{ steps.context.outputs.extra_context }}
          AGENT_NAME: "SyncApp bug fix (${{ github.event_name }})"
        run: bash .github/scripts/trigger-cursor-bug-agent.sh
